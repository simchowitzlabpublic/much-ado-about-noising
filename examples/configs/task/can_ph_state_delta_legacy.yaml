# @package task
defaults:
  - robomimic_base
  - _self_

env_name: "can"
obs_type: "state"
env_type: "ph"
abs_action: true
action_type: "delta"

# HuggingFace dataset configuration - uses original delta actions dataset
# with rot6d conversion (abs_action: true converts 7D -> 10D)
dataset_filename: "robomimic/can/ph/low_dim.hdf5"

max_episode_steps: 400
obs_keys: ["object", "robot0_eef_pos", "robot0_eef_quat", "robot0_gripper_qpos"]

# Required keys
horizon: 10
act_dim: 10
