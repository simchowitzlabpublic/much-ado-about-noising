# @package task
defaults:
  - robomimic_base
  - _self_

env_name: "square"
obs_type: "state"
env_type: "ph"
abs_action: false
action_type: "delta"

# HuggingFace dataset configuration - auto-downloads from the repository
dataset_filename: "robomimic/square/ph/low_dim.hdf5"

max_episode_steps: 400
obs_keys: ["object", "robot0_eef_pos", "robot0_eef_quat", "robot0_gripper_qpos"]

# Required keys
horizon: 10
act_dim: 7
